<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHYA NYC - Admin Panel</title>
    <link rel="icon" type="image/png" href="ihya-logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin-styles.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <img src="ihya-logo.png" alt="IHYA NYC" class="login-logo">
            <h1>Admin Access</h1>
            <p>Enter password to continue</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder="Password" required>
                </div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="btn-primary">Access Admin</button>
            </form>
            
            <div class="login-attempts" id="attemptsWarning"></div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-container" style="display: none;">
        
        <!-- Header -->
        <header class="admin-header">
            <div class="header-content">
                <div class="header-left">
                    <img src="ihya-logo.png" alt="IHYA NYC" class="header-logo">
                    <h1>IHYA NYC Admin</h1>
                </div>
                <div class="header-right">
                    <span class="admin-user">👤 Admin</span>
                    <button onclick="logout()" class="btn-logout">Logout</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="admin-main">
            
            <!-- Dashboard View -->
            <div id="dashboardView" class="view active">
                
                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-icon">📅</div>
                        <div class="stat-info">
                            <div class="stat-value" id="upcomingCount">0</div>
                            <div class="stat-label">Upcoming Events</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📁</div>
                        <div class="stat-info">
                            <div class="stat-value" id="totalEvents">0</div>
                            <div class="stat-label">Total Events</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🖼️</div>
                        <div class="stat-info">
                            <div class="stat-value" id="flyerCount">0</div>
                            <div class="stat-label">Flyers</div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button onclick="showAddEvent()" class="btn-primary btn-large">
                        ➕ Add New Event
                    </button>
                    <button onclick="refreshEvents()" class="btn-secondary btn-large">
                        🔄 Refresh
                    </button>
                </div>

                <!-- Events List -->
                <div class="section-header">
                    <h2>📅 Upcoming Events</h2>
                </div>
                <div id="eventsList" class="events-list">
                    <!-- Events will be loaded here -->
                </div>

                <div class="section-header" style="margin-top: 3rem;">
                    <h2>📚 Past Events</h2>
                </div>
                <div id="pastEventsList" class="events-list">
                    <!-- Past events will be loaded here -->
                </div>

            </div>

            <!-- Add/Edit Event View -->
            <div id="eventFormView" class="view">
                <div class="view-header">
                    <button onclick="showDashboard()" class="btn-back">← Back to Dashboard</button>
                    <h2 id="formTitle">Add New Event</h2>
                </div>

                <form id="eventForm" class="event-form">
                    <input type="hidden" id="eventId">
                    
                    <div class="form-group">
                        <label for="eventTitle">Event Title *</label>
                        <input type="text" id="eventTitle" required placeholder="e.g., Weekly Thursday Halaqa">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventType">Event Type *</label>
                            <select id="eventType" required>
                                <option value="">Select type...</option>
                                <option value="halaqa">Weekly Halaqa</option>
                                <option value="sisters">Sisters Halaqa</option>
                                <option value="community">Community Event</option>
                                <option value="social">IHYA Social</option>
                                <option value="arabic">Arabic Class</option>
                                <option value="special">Special Event</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="eventDate">Date *</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        <div class="form-group">
                            <label for="eventTime">Time *</label>
                            <input type="time" id="eventTime" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="eventLocation">Location *</label>
                        <input type="text" id="eventLocation" required placeholder="e.g., Behind Qahwah House, Astoria">
                    </div>

                    <div class="form-group">
                        <label for="eventDescription">Description *</label>
                        <textarea id="eventDescription" rows="4" required placeholder="Brief description of the event..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="eventSpeaker">Speaker/Leader (optional)</label>
                        <input type="text" id="eventSpeaker" placeholder="e.g., Mufti Aminul Islam">
                    </div>

                    <div class="form-group">
                        <label for="eventRegistration">Registration Link (optional)</label>
                        <input type="url" id="eventRegistration" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label>Event Flyer *</label>
                        <div class="flyer-upload-area" id="flyerUploadArea">
                            <div class="upload-placeholder" id="uploadPlaceholder">
                                <div class="upload-icon">📤</div>
                                <p>Drag & drop flyer here or click to browse</p>
                                <p class="upload-hint">JPG, PNG - Max 5MB</p>
                            </div>
                            <div class="flyer-preview" id="flyerPreview" style="display: none;">
                                <img id="flyerPreviewImg" src="" alt="Flyer preview">
                                <button type="button" onclick="removeFlyer()" class="btn-remove-flyer">✕ Remove</button>
                            </div>
                            <input type="file" id="flyerInput" accept="image/*" style="display: none;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="featuredEvent">
                            <span>Feature this event (show prominently on homepage)</span>
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="button" onclick="previewEvent()" class="btn-secondary">👁️ Preview</button>
                        <button type="submit" class="btn-primary" id="publishBtn">
                            <span class="btn-text">Publish Event</span>
                            <span class="btn-loading" style="display: none;">
                                <span class="spinner"></span> Publishing...
                            </span>
                        </button>
                    </div>
                </form>
            </div>

        </main>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner">
                <div class="spinner-large"></div>
                <p>Processing...</p>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container"></div>

    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Event Preview</h3>
                <button onclick="closePreview()" class="modal-close">✕</button>
            </div>
            <div class="modal-body" id="previewContent">
                <!-- Preview will be inserted here -->
            </div>
            <div class="modal-footer">
                <button onclick="closePreview()" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
