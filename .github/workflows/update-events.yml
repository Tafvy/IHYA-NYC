name: Update Events

on:
  workflow_dispatch:
    inputs:
      event_data:
        description: 'Event data as JSON'
        required: true
        type: string
      action_type:
        description: 'Action type (add, update, delete)'
        required: true
        type: string
      event_id:
        description: 'Event ID (for update/delete)'
        required: false
        type: string

jobs:
  update-events:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update events.json
        run: |
          # Read current events
          EVENTS_FILE="data/events.json"
          
          # Create data directory if it doesn't exist
          mkdir -p data
          
          # Initialize events file if it doesn't exist
          if [ ! -f "$EVENTS_FILE" ]; then
            echo '{"events":[],"lastUpdated":""}' > "$EVENTS_FILE"
          fi
          
          # Parse input
          ACTION="${{ github.event.inputs.action_type }}"
          EVENT_DATA='${{ github.event.inputs.event_data }}'
          EVENT_ID="${{ github.event.inputs.event_id }}"
          
          # Update events based on action
          if [ "$ACTION" = "add" ]; then
            # Add new event
            jq --argjson new "$EVENT_DATA" '.events += [$new] | .lastUpdated = now | .events |= sort_by(.date)' "$EVENTS_FILE" > tmp.json
            mv tmp.json "$EVENTS_FILE"
          elif [ "$ACTION" = "update" ]; then
            # Update existing event
            jq --arg id "$EVENT_ID" --argjson new "$EVENT_DATA" '.events = [.events[] | if .id == $id then $new else . end] | .lastUpdated = now | .events |= sort_by(.date)' "$EVENTS_FILE" > tmp.json
            mv tmp.json "$EVENTS_FILE"
          elif [ "$ACTION" = "delete" ]; then
            # Delete event
            jq --arg id "$EVENT_ID" '.events = [.events[] | select(.id != $id)] | .lastUpdated = now' "$EVENTS_FILE" > tmp.json
            mv tmp.json "$EVENTS_FILE"
          fi
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/events.json
          git diff --staged --quiet || git commit -m "Update events via admin panel"
          git push
